<!DOCTYPE html>
<html>
<head>
    <title>Test API</title>
</head>
<body>
    <h1>Test API Connection</h1>
    <button onclick="testAPI()">Tester l'API</button>
    <div id="result"></div>
    
    <script>
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>Chargement...</p>';
            
            try {
                const response = await fetch('http://localhost:3000/api/clients');
                const data = await response.json();
                resultDiv.innerHTML = `
                    <p><strong>Status:</strong> ${response.status}</p>
                    <p><strong>Clients trouvés:</strong> ${data.clients ? data.clients.length : 0}</p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<p style="color: red;"><strong>Erreur:</strong> ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
